# Configures GitHub's auto-generated release notes.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: 🚀 Features
      labels: ["feature", "enhancement"]
    - title: 🐛 Fixes
      labels: ["bug", "fix"]
    - title: 📚 Docs
      labels: ["docs", "documentation"]
    - title: 🧱 Infra & DX
      labels: ["infra", "ci", "devx", "build"]
    - title: 🔐 Security
      labels: ["security"]
    - title: ♻️ Refactors
      labels: ["refactor", "chore"]
    - title: 📦 Dependencies
      labels: ["deps"]
    - title: 🏗 Other Changes
      labels: ["*"]
