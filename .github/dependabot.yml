# Auto-update base images and CI actions.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # Docker Compose base images (postgres, qdrant, nginx, pgadmin)
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "docker"]

  # GitHub Actions in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "ci"]
