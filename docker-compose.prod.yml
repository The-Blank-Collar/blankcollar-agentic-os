# =============================================================================
# Blank Collar — Agentic OS · production overlay (Hetzner + Coolify)
# -----------------------------------------------------------------------------
# Used in production on top of docker-compose.yml. Coolify ingests this file
# directly and manages the public ingress + TLS via its own Caddy.
#
# To preview the production shape locally:
#     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this overlay does:
#   1. Removes host-port mappings from every internal service so the only
#      thing reachable from outside the host is paperclip on :3000 — and
#      even that is fronted by Coolify's reverse proxy in production.
#   2. Sets ENV=production on every app container so logging / error
#      reporting can branch on it.
#   3. Locks every service to `restart: unless-stopped`. (Most already are
#      via the base compose's anchor; this is belt-and-suspenders.)
#
# What this overlay does NOT do:
#   - Run its own Caddy / TLS terminator. Coolify handles that on the host.
#   - Set hard `mem_limit` / `cpus` on each service. Hetzner CPX31 has
#     8 GB RAM and `cloud-bootstrap.sh` adds 4 GB swap, so Linux + swap
#     handles bursts without OOM kills. Add limits later if you observe
#     real pressure (look at `docker stats` after a week of normal use).
#   - Override image tags. Coolify rebuilds from this repo on every push
#     to main; the image refs in the base compose are correct.
#
# Secrets:
#   - .env on the server is managed by Coolify's encrypted env-var store.
#     Never commit production values; never paste them into chat.
# =============================================================================

services:
  # ------------------------------------------------------------------------
  # Databases — internal-only in prod. Only services on bc_net reach them.
  # ------------------------------------------------------------------------
  postgres:
    ports: !reset []
    restart: unless-stopped

  qdrant:
    ports: !reset []
    restart: unless-stopped

  neo4j:
    ports: !reset []
    restart: unless-stopped

  # ------------------------------------------------------------------------
  # Application services — all internal-only EXCEPT paperclip, which is
  # what Coolify's reverse proxy routes the public traffic to.
  # ------------------------------------------------------------------------
  paperclip:
    # paperclip's container port stays at :80 (per the base compose);
    # Coolify discovers it via container name + COOLIFY_FQDN inject.
    environment:
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Once Supabase is wired (Phase 6), flip this to true.
      PAPERCLIP_AUTH_ENFORCE: ${PAPERCLIP_AUTH_ENFORCE:-false}
    restart: unless-stopped

  hermes:
    ports: !reset []
    environment:
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  openclaw:
    ports: !reset []
    environment:
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  langgraph:
    ports: !reset []
    environment:
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  gbrain:
    ports: !reset []
    environment:
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  graphiti:
    ports: !reset []
    environment:
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  email-ingest:
    environment:
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  # ------------------------------------------------------------------------
  # Nango — its own DB + Redis sidecars stay internal-only too.
  # The OAuth callback URL needs to be the public host once a domain is
  # wired (Phase 3b); for the IP-first deploy we pin the in-cluster URL.
  # ------------------------------------------------------------------------
  nango-db:
    ports: !reset []
    restart: unless-stopped

  nango-redis:
    ports: !reset []
    restart: unless-stopped

  nango:
    ports: !reset []
    restart: unless-stopped
