<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>The Blank Collar — Coming Soon</title>
    <style>
      :root { color-scheme: light dark; }
      body{font-family:-apple-system,system-ui,sans-serif;background:#0b0d10;color:#e7eaee;
           display:grid;place-items:center;min-height:100vh;margin:0;padding:2rem}
      .card{max-width:680px;padding:3rem;text-align:center;background:#121519;
            border:1px solid #1f242b;border-radius:16px;
            box-shadow:0 30px 60px -30px rgba(0,0,0,.6)}
      h1{margin:0 0 .5rem;font-size:2.25rem;letter-spacing:-0.02em}
      p{color:#aab2bd;line-height:1.55}
      .pill{display:inline-block;padding:.25rem .6rem;border-radius:999px;
            background:#1a1f25;color:#9aa4b1;font-size:.8rem;margin-bottom:1rem}
      .promise{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-top:1.5rem;font-size:.9rem}
      .promise div{background:#1a1f25;padding:.85rem;border-radius:10px;color:#cbd2db}
      a{color:#7aa7ff}
      @media (max-width:640px){.promise{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="pill">Phase 8 · placeholder</div>
      <h1>Work is for bots.<br/>Life is for humans.</h1>
      <p><strong>The Blank Collar Agentic OS</strong> — coming to <code>www.blankcollar.ai</code>.</p>
      <div class="promise">
        <div><strong>1.</strong> Tell us what you want.</div>
        <div><strong>2.</strong> We hire the agents.</div>
        <div><strong>3.</strong> Wake up to the result.</div>
      </div>
      <p style="margin-top:1.75rem;font-size:.85rem;color:#7e8794">
        Until then: <a href="https://www.theblankcollar.com">www.theblankcollar.com</a> ·
        <a href="https://github.com/The-Blank-Collar/blankcollar-agentic-os">GitHub</a>
      </p>
    </main>
  </body>
</html>
